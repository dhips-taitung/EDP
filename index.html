<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地震防災資訊平台</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    .tabs { display: flex; background: #2c3e50; }
    .tab { flex: 1; padding: 15px; text-align: center; color: white; cursor: pointer; }
    .tab.active { background: #34495e; }
    .content { display: none; padding: 20px; }
    .content.active { display: block; }
    iframe { width: 100%; border: none; }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">防災資料</div>
  <div class="tab" onclick="showTab(1)">填寫回報</div>
</div>

<div class="content active">
  <h2>防災統計回報資料</h2>
  <iframe 
    src="https://docs.google.com/spreadsheets/d/179cZdIStY7za1WDwqGtA302kO1Llws0NHXRW69lOfB0/gviz/tq?tqx=out:html&sheet=防災統計回報" 
    height="600">
  </iframe>
</div>

<div class="content">
  <h2>填寫防災回報表單</h2>
  <iframe 
    src="https://forms.gle/rCjutDzpHVmPoNNh6" 
    height="800">
  </iframe>
</div>

<script>
function showTab(index) {
  const tabs = document.querySelectorAll('.tab');
  const contents = document.querySelectorAll('.content');

  tabs.forEach((tab, i) => {
    tab.classList.toggle('active', i === index);
    contents[i].classList.toggle('active', i === index);
  });
}
</script>

</body>
</html>
