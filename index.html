<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震防災系統</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        /* 導覽列與分頁控制 */
        .tabs {
            display: flex;
            background: var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #34495e;
            border-bottom: 4px solid #3498db;
            font-weight: bold;
        }

        .content-section {
            display: none;
            padding: 15px;
        }

        .content-section.active {
            display: block;
        }

        /* 關鍵數據顯示區 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .summary-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            border-left: 5px solid #3498db;
        }

        .summary-item .label { font-size: 14px; color: #666; }
        .summary-item .value { font-size: 20px; font-weight: bold; color: var(--accent-color); margin-top: 5px; }

        /* 表格樣式 */
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* 確保在手機上可捲動而非壓縮 */
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        th { background-color: #ecf0f1; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* 按鈕優化 */
        .refresh-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
            font-size: 16px;
        }

        .refresh-btn:hover { background: #219150; }

        /* 表單嵌入 */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 85vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 讀取中動畫 */
        #loader { text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('report')">防災統計回報</button>
        <button class="tab-btn" onclick="showTab('form')">表單填寫</button>
    </div>

    <!-- 分頁 1: 防災統計回報 -->
    <div id="report" class="content-section active">
        <button class="refresh-btn" onclick="fetchData()">🔄 更新統計資料</button>
        
        <div id="loader">讀取資料中...</div>

        <!-- 關鍵數據摘要 (J3, J5, J7, J9, J11) -->
        <div class="summary-grid" id="summaryArea">
            <div class="summary-item"><div class="label">學生應到</div><div id="j3" class="value">-</div></div>
            <div class="summary-item"><div class="label">學生實到</div><div id="j5" class="value">-</div></div>
            <div class="summary-item"><div class="label">避難引導組</div><div id="j7" class="value">-</div></div>
            <div class="summary-item"><div class="label">全校應到</div><div id="j9" class="value">-</div></div>
            <div class="summary-item"><div class="label">實到合計</div><div id="j11" class="value">-</div></div>
        </div>

        <!-- 完整 A1:J25 表格 -->
        <div class="table-container">
            <table id="dataTable">
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 分頁 2: 表單填寫 -->
    <div id="form" class="content-section">
        <div class="iframe-container">
            <!-- 已將網址轉換為嵌入式連結 -->
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdUuXf2fN8wXN08q8rK_wZ6Xn8_XW-D-O1E9m_n08O-z_X-mQ/viewform?embedded=true">載入中…</iframe>
        </div>
    </div>

    <script>
        const sheetId = '179cZdIStY7za1WDwqGtA302kO1Llws0NHXRW69lOfB0';
        const sheetName = encodeURIComponent('防災統計回報');
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;

        // 分頁切換
        function showTab(tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 讀取試算表資料
        async function fetchData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = parseCSV(data);
                
                renderSummary(rows);
                renderTable(rows);
            } catch (error) {
                console.error('Error:', error);
                alert('無法讀取資料，請檢查試算表權限設定。');
            } finally {
                loader.style.display = 'none';
            }
        }

        // 解析 CSV (處理包含逗號的單元格)
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return parts.map(part => part.replace(/^"|"$/g, '').trim());
            });
        }

        // 渲染摘要數據 (J3:J11 為索引 [row][9])
        function renderSummary(rows) {
            // 試算表 J 欄索引是 9 (A=0, B=1...)
            // 試算表第 3 列索引是 2 (1-based to 0-based)
            const safeGet = (r, c) => (rows[r] && rows[r][c]) ? rows[r][c] : '0';
            
            document.getElementById('j3').innerText = safeGet(2, 9);
            document.getElementById('j5').innerText = safeGet(4, 9);
            document.getElementById('j7').innerText = safeGet(6, 9);
            document.getElementById('j9').innerText = safeGet(8, 9);
            document.getElementById('j11').innerText = safeGet(10, 9);
        }

        // 渲染 A1:J25 表格
        function renderTable(rows) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            head.innerHTML = '';
            body.innerHTML = '';

            // 限制在 A1:J25 (25列, 10欄)
            const rowLimit = Math.min(rows.length, 25);
            const colLimit = 10; 

            rows.slice(0, rowLimit).forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                for (let i = 0; i < colLimit; i++) {
                    const cellValue = row[i] || '';
                    if (rowIndex === 0) {
                        const th = document.createElement('th');
                        th.innerText = cellValue;
                        head.appendChild(th);
                    } else {
                        const td = document.createElement('td');
                        td.innerText = cellValue;
                        tr.appendChild(td);
                    }
                }
                if (rowIndex !== 0) body.appendChild(tr);
            });
        }

        // 初始載入
        window.onload = fetchData;
    </script>
</body>
</html>
