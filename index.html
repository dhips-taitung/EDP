<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>防災資訊網</title>
<style>
body {font-family: Arial, sans-serif; margin: 20px;}
.tab {overflow: hidden; border-bottom: 1px solid #ccc;}
.tab button {background-color: inherit; border: none; outline: none; padding: 10px 20px; cursor: pointer;}
.tab button.active {border-bottom: 2px solid #007bff; font-weight: bold;}
.tabcontent {display: none; padding: 20px 0;}
table {border-collapse: collapse; width: 100%; margin-top: 10px;}
th, td {border: 1px solid #ccc; padding: 8px; text-align: left;}
th {background-color: #f2f2f2;}
button.updateBtn {padding: 6px 12px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px;}
button.updateBtn:hover {background-color: #0056b3;}
</style>
</head>
<body>

<h2>防災資訊網</h2>

<div class="tab">
  <button class="tablinks active" onclick="openTab(event,'earthquake')">地震防災</button>
  <button class="tablinks" onclick="openTab(event,'form')">防災回報表單</button>
</div>

<div id="earthquake" class="tabcontent" style="display:block;">
  <button class="updateBtn" onclick="loadData()">更新資料</button>
  <div id="dataTableContainer">
    <p>資料載入中...</p>
  </div>
</div>

<div id="form" class="tabcontent">
  <iframe src="https://docs.google.com/forms/d/e/rCjutDzpHVmPoNNh6/viewform?embedded=true" width="100%" height="800" frameborder="0" marginheight="0" marginwidth="0">載入中…</iframe>
</div>

<script>
function openTab(evt, tabName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for(i=0;i<tabcontent.length;i++){tabcontent[i].style.display="none";}
  tablinks = document.getElementsByClassName("tablinks");
  for(i=0;i<tablinks.length;i++){tablinks[i].className = tablinks[i].className.replace(" active","");}
  document.getElementById(tabName).style.display="block";
  evt.currentTarget.className += " active";
}

// 讀取試算表資料 (A1:J25)
function loadData(){
  const container = document.getElementById("dataTableContainer");
  container.innerHTML = "<p>資料載入中...</p>";

  const spreadsheetId = "179cZdIStY7za1WDwqGtA302kO1Llws0NHXRW69lOfB0"; // <- 替換成你的試算表ID
  const range = "防災統計回報!A1:J25";

  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}?key=1RpX43TwTZInyjte27ISYd8JfDzzXwjOCN4pOimiqr6c`)
  .then(res=>res.json())
  .then(data=>{
    if(!data.values){container.innerHTML="<p>無資料</p>"; return;}
    let table = "<table><tr>";
    data.values[0].forEach(h=>{table+="<th>"+h+"</th>";});
    table+="</tr>";
    for(let i=1;i<data.values.length;i++){
      table+="<tr>";
      data.values[i].forEach(c=>{table+="<td>"+(c||"")+"</td>";});
      table+="</tr>";
    }
    table+="</table>";
    container.innerHTML = table;
  })
  .catch(err=>{
    console.error(err);
    container.innerHTML="<p>資料載入失敗</p>";
  });
}

// 頁面載入時自動抓一次
window.onload = loadData;
</script>

</body>
</html>
